[graph]
all-features = true

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# gtk3 bindings are unmaintained but we still support them as an optional backend
ignore = [
    "RUSTSEC-2024-0370", # proc-macro-error unmaintained (gtk3 dep)
    "RUSTSEC-2024-0412", # gtk3 bindings unmaintained
    "RUSTSEC-2024-0413", # gtk3 bindings unmaintained
    "RUSTSEC-2024-0415", # gtk3 bindings unmaintained
    "RUSTSEC-2024-0416", # gtk3 bindings unmaintained
    "RUSTSEC-2024-0418", # gtk3 bindings unmaintained
    "RUSTSEC-2024-0419", # gtk3 bindings unmaintained
    "RUSTSEC-2024-0420", # gtk3 bindings unmaintained
    "RUSTSEC-2024-0436", # paste unmaintained (gtk3 dep)
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
