name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  LINUX_APT_DEPS: libx11-dev libxext-dev libxcursor-dev libxrender-dev libxfixes-dev libpipewire-0.3-dev libclang-dev libgbm-dev libegl-dev libwayland-dev libxkbcommon-dev libxkbcommon-x11-dev libdbus-1-dev
  LINUX_FLTK_APT_DEPS: libxft-dev libxinerama-dev libpango1.0-dev libgl1-mesa-dev libglu1-mesa-dev cmake

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows

          - os: ubuntu-latest
            name: Linux

          - os: ubuntu-latest
            name: Linux FLTK
            cargo-args: --features fltk
            extra-apt-deps: $LINUX_FLTK_APT_DEPS

          - os: ubuntu-latest
            name: Linux GTK
            cargo-args: --features gtk
            extra-apt-deps: libgtk-3-dev

          - os: macos-latest
            name: macOS

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ env.LINUX_APT_DEPS }} ${{ matrix.extra-apt-deps }}

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.name }}

      - name: Start virtual display
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y xvfb
          Xvfb :99 -screen 0 1024x768x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Build
        run: cargo build --locked ${{ matrix.cargo-args }}

      - name: Test
        run: cargo test --locked --lib --tests ${{ matrix.cargo-args }}

  clippy:
    name: Clippy (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows

          - os: ubuntu-latest
            name: Linux

          - os: ubuntu-latest
            name: Linux FLTK
            cargo-args: --features fltk
            extra-apt-deps: $LINUX_FLTK_APT_DEPS

          - os: ubuntu-latest
            name: Linux GTK
            cargo-args: --features gtk
            extra-apt-deps: libgtk-3-dev

          - os: macos-latest
            name: macOS

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ env.LINUX_APT_DEPS }} ${{ matrix.extra-apt-deps }}

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: clippy-${{ matrix.name }}

      - name: Clippy
        run: cargo clippy --locked --all-targets ${{ matrix.cargo-args }} -- -D warnings

  win32-direct:
    name: Windows (win32-direct)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: win32-direct

      - name: Build
        run: cargo build --locked --features win32-direct

  doctest:
    name: Doc Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ env.LINUX_APT_DEPS }} ${{ env.LINUX_FLTK_APT_DEPS }} libgtk-3-dev

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: doctest

      - name: Run doc tests
        run: cargo test --locked --doc --features gtk,fltk

  headless-build:
    name: Headless Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ env.LINUX_APT_DEPS }} musl-tools

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: x86_64-unknown-linux-musl

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: headless-build

      - name: Build headless test
        run: cargo build --manifest-path tests/headless/Cargo.toml --target x86_64-unknown-linux-musl --release

      - name: Upload binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: headless-binary
          path: tests/headless/target/x86_64-unknown-linux-musl/release/xdialog-headless-test

  headless:
    name: Headless (${{ matrix.distro }})
    needs: headless-build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro:
          - ubuntu:12.04
          - ubuntu:18.04
          - ubuntu:24.04
          - debian:7
          - debian:bookworm-slim
          - alpine:3.3
          - alpine:3.20
          - centos:6
          - centos:7
          - fedora:21
          - fedora:41
          - gcr.io/distroless/static-debian12
    steps:
      - name: Download binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: headless-binary

      - name: Run in container
        run: |
          chmod +x xdialog-headless-test
          docker run --rm \
            -v $PWD/xdialog-headless-test:/xdialog-headless-test \
            ${{ matrix.distro }} \
            /xdialog-headless-test

  visual-regression:
    name: Visual Regression (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows

          - os: macos-latest
            name: macOS

          - os: ubuntu-latest
            name: Linux

          - os: ubuntu-latest
            name: Linux Wayland
            wayland: true

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ env.LINUX_APT_DEPS }}

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: visual-regression-${{ matrix.name }}

      - name: Start virtual display (X11)
        if: runner.os == 'Linux' && !matrix.wayland
        run: |
          sudo apt-get install -y xvfb openbox
          Xvfb :99 -screen 0 1280x1024x24 &
          sleep 1
          DISPLAY=:99 openbox &
          sleep 2
          echo "DISPLAY=:99" >> $GITHUB_ENV
          # Verify window manager is running
          DISPLAY=:99 xprop -root _NET_CLIENT_LIST_STACKING || echo "Warning: WM may not be ready"

      - name: Start virtual display (Wayland)
        if: matrix.wayland
        run: |
          sudo apt-get install -y sway grim
          export XDG_RUNTIME_DIR="${XDG_RUNTIME_DIR:-/tmp/wayland-runtime}"
          mkdir -p "$XDG_RUNTIME_DIR"
          echo "XDG_RUNTIME_DIR=$XDG_RUNTIME_DIR" >> $GITHUB_ENV
          # Minimal sway config for headless mode
          mkdir -p /tmp/sway-config
          cat > /tmp/sway-config/config << 'SWAYCFG'
          output HEADLESS-1 resolution 500x500
          SWAYCFG
          # Start sway with headless wlroots backend (supports wlr-screencopy for grim)
          WLR_BACKENDS=headless WLR_LIBINPUT_NO_DEVICES=1 sway -c /tmp/sway-config/config &
          sleep 3
          # Find the socket sway created
          SOCKET=$(ls "$XDG_RUNTIME_DIR"/wayland-* 2>/dev/null | head -1 | xargs basename)
          echo "Found Wayland socket: $SOCKET"
          echo "WAYLAND_DISPLAY=$SOCKET" >> $GITHUB_ENV

      - name: Run visual regression tests
        env:
          XDIALOG_VISUAL_TEST: "1"
        run: cargo test --locked ${{ matrix.cargo-args }} --test visual_regression

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: visual-regression-output-${{ matrix.name }}
          path: tests/visual_output/

  supply-chain:
    name: Supply Chain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install cargo-deny
        run: cargo install --locked cargo-deny

      - name: Check advisories
        run: cargo deny --all-features check advisories

      - name: Check licenses
        run: cargo deny --all-features check licenses

      - name: Check bans
        run: cargo deny --all-features check bans

      - name: Check sources
        run: cargo deny --all-features check sources
