name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  LINUX_APT_DEPS: libx11-dev libxext-dev libxcursor-dev libxrender-dev libxfixes-dev libpipewire-0.3-dev libclang-dev libgbm-dev libegl-dev libwayland-dev libxkbcommon-dev libxkbcommon-x11-dev libdbus-1-dev
  LINUX_FLTK_APT_DEPS: libxft-dev libxinerama-dev libpango1.0-dev libgl1-mesa-dev libglu1-mesa-dev cmake

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows

          - os: ubuntu-latest
            name: Linux

          - os: ubuntu-latest
            name: Linux FLTK
            cargo-args: --features fltk
            extra-apt-deps: $LINUX_FLTK_APT_DEPS

          - os: ubuntu-latest
            name: Linux GTK
            cargo-args: --features gtk
            extra-apt-deps: libgtk-3-dev

          - os: macos-latest
            name: macOS

    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ env.LINUX_APT_DEPS }} ${{ matrix.extra-apt-deps }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.name }}

      - name: Start virtual display
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y xvfb
          Xvfb :99 -screen 0 1024x768x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Build
        run: cargo build ${{ matrix.cargo-args }}

      - name: Test
        run: cargo test --lib --tests ${{ matrix.cargo-args }}

  clippy:
    name: Clippy (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows

          - os: ubuntu-latest
            name: Linux

          - os: ubuntu-latest
            name: Linux FLTK
            cargo-args: --features fltk
            extra-apt-deps: $LINUX_FLTK_APT_DEPS

          - os: ubuntu-latest
            name: Linux GTK
            cargo-args: --features gtk
            extra-apt-deps: libgtk-3-dev

          - os: macos-latest
            name: macOS

    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ env.LINUX_APT_DEPS }} ${{ matrix.extra-apt-deps }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          key: clippy-${{ matrix.name }}

      - name: Clippy
        run: cargo clippy --all-targets ${{ matrix.cargo-args }} -- -D warnings

  win32-direct:
    name: Windows (win32-direct)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: win32-direct

      - name: Build
        run: cargo build --features win32-direct

  doctest:
    name: Doc Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ env.LINUX_APT_DEPS }} ${{ env.LINUX_FLTK_APT_DEPS }} libgtk-3-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: doctest

      - name: Run doc tests
        run: cargo test --doc --features gtk,fltk

  headless:
    name: Linux Headless
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ env.LINUX_APT_DEPS }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: headless

      - name: Run headless test
        env:
          XDIALOG_HEADLESS_TEST: "1"
        run: cargo test --test headless_linux

  visual-regression:
    name: Visual Regression (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
          - os: macos-latest
            name: macOS
          - os: ubuntu-latest
            name: Linux

          - os: ubuntu-latest
            name: Linux Wayland
            wayland: true

    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ env.LINUX_APT_DEPS }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: visual-regression-${{ matrix.name }}

      - name: Start virtual display (X11)
        if: runner.os == 'Linux' && !matrix.wayland
        run: |
          sudo apt-get install -y xvfb openbox
          Xvfb :99 -screen 0 1280x1024x24 &
          sleep 1
          DISPLAY=:99 openbox &
          sleep 2
          echo "DISPLAY=:99" >> $GITHUB_ENV
          # Verify window manager is running
          DISPLAY=:99 xprop -root _NET_CLIENT_LIST_STACKING || echo "Warning: WM may not be ready"

      - name: Start virtual display (Wayland)
        if: matrix.wayland
        run: |
          sudo apt-get install -y weston
          # Start weston with headless backend (no X11 needed — we capture the full monitor)
          weston --backend=headless --width=500 --height=500 &
          sleep 3
          echo "WAYLAND_DISPLAY=wayland-1" >> $GITHUB_ENV

      - name: Run visual regression tests
        env:
          XDIALOG_VISUAL_TEST: "1"
        run: cargo test ${{ matrix.cargo-args }} --test visual_regression

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: visual-regression-output-${{ matrix.name }}
          path: tests/visual_output/
