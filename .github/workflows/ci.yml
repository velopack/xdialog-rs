name: CI

on: 
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows - win32 backend only (no fltk, no gtk)
          - os: windows-latest
            name: Windows (win32 only)
            cargo-args: --no-default-features

          # Windows - win32 + fltk
          - os: windows-latest
            name: Windows (fltk-bundled)
            cargo-args: --no-default-features --features fltk-bundled

          # Windows - win32-direct
          - os: windows-latest
            name: Windows (win32-direct)
            cargo-args: --no-default-features --features win32-direct

          # Linux - fltk only
          - os: ubuntu-latest
            name: Linux (fltk-bundled)
            cargo-args: --no-default-features --features fltk-bundled
            apt-deps: libx11-dev libxext-dev libxft-dev libxinerama-dev libxcursor-dev libxrender-dev libxfixes-dev libpango1.0-dev libgl1-mesa-dev libglu1-mesa-dev

          # Linux - gtk3 only
          - os: ubuntu-latest
            name: Linux (gtk3)
            cargo-args: --no-default-features --features gtk3
            apt-deps: libgtk-3-dev

          # Linux - fltk + gtk3
          - os: ubuntu-latest
            name: Linux (fltk-bundled + gtk3)
            cargo-args: --no-default-features --features fltk-bundled,gtk3
            apt-deps: libgtk-3-dev libx11-dev libxext-dev libxft-dev libxinerama-dev libxcursor-dev libxrender-dev libxfixes-dev libpango1.0-dev libgl1-mesa-dev libglu1-mesa-dev

          # macOS - fltk only
          - os: macos-latest
            name: macOS (fltk-bundled)
            cargo-args: --no-default-features --features fltk-bundled

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        if: matrix.apt-deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt-deps }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.name }}

      - name: Build
        run: cargo build ${{ matrix.cargo-args }}

  visual-regression:
    name: Visual Regression (Windows)
    runs-on: windows-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: visual-regression

      - name: Run visual regression tests
        run: cargo test --no-default-features --test visual_regression -- --ignored --test-threads=1

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-output
          path: tests/visual_output/
