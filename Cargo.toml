[package]
name = "xdialog"
version = "0.2.3"
edition = "2021"
license = "MIT"
description = "A small native-ish cross platform dialogs library with zero runtime dependencies."
authors = ["Caelan Sayler <git@caesay.com>"]
repository = "https://github.com/velopack/xdialog"
keywords = ["dialog", "message-box", "messagebox", "cross-platform"]
categories = ["graphics", "gui", "visualization"]

[features]
default = ["fltk-bundled", "gtk3"]
fltk = ["dep:fltk", "dep:font-kit", "dep:dark-light", "dep:mina", "dep:enum-map"]
fltk-bundled = ["fltk", "fltk/fltk-bundled"]
gtk3 = ["dep:gtk", "dep:glib"]
win32-direct = []

[dependencies]
log = "0.4"
oneshot = { version = "0.2", features = ["std"] }
thiserror = "2.0"

# FLTK Backend
enum-map = { version = "2.7", optional = true }
fltk = { version = "1.5", optional = true }
font-kit = { version = "0.14", optional = true }
dark-light = { version = "2.0", optional = true }
mina = { version = "0.1", optional = true }

# GTK3 Backend
[target.'cfg(target_os = "linux")'.dependencies]
gtk = { version = "0.18", optional = true }
glib = { version = "0.18", optional = true }

# Win32 Backend
[target.'cfg(windows)'.dependencies]
windows = { version = "0.62", features = [
    "Win32_System",
    "Win32_Foundation",
    "Win32_UI_Controls",
    "Win32_UI_WindowsAndMessaging",
    "Win32_System_LibraryLoader",
] }
widestring = "1.2"

[dev-dependencies]
ntest = "0.9"