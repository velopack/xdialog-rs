[package]
name = "xdialog"
version = "0.2.3"
edition = "2021"
license = "MIT"
description = "A small native-ish cross platform dialogs library with zero runtime dependencies."
authors = ["Caelan Sayler <git@caesay.com>"]
repository = "https://github.com/velopack/xdialog"
keywords = ["dialog", "message-box", "messagebox", "cross-platform"]
categories = ["graphics", "gui", "visualization"]

[features]
default = ["fltk-bundled"]
fltk-bundled = ["fltk/fltk-bundled"]
public-backends = []

[dependencies]
log = "0.4"
enum-map = "2.7"
oneshot = { version = "0.2", features = ["std"] }
thiserror = "2.0"
fltk = "1.5"
font-kit = "0.14"
mina = "0.1"

[target.'cfg(target_os = "macos")'.dependencies]
objc2 = "0.6"
objc2-foundation = { version = "0.3", features = [
    "NSString",
    "NSDate",
    "NSRunLoop",
    "NSObject",
    "NSDictionary",
    "NSAttributedString",
    "NSGeometry",
    "NSValue",
    "NSArray",
] }
objc2-app-kit = { version = "0.3", features = [
    "NSApplication",
    "NSWindow",
    "NSView",
    "NSTextField",
    "NSButton",
    "NSImageView",
    "NSImage",
    "NSProgressIndicator",
    "NSFont",
    "NSColor",
    "NSScreen",
    "NSEvent",
    "NSControl",
    "NSResponder",
    "NSCell",
    "NSButtonCell",
    "NSRunningApplication",
    "NSGraphics",
    "NSText",
    "NSPanel",
] }
block2 = "0.6"

[target.'cfg(windows)'.dependencies]
windows = { version = "0.62", features = [
    "Win32_System",
    "Win32_Foundation",
    "Win32_UI_Controls",
    "Win32_UI_WindowsAndMessaging",
    "Win32_System_LibraryLoader",
] }
widestring = "1.2"